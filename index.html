<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quilt Colour Picker</title>
  <style>
    :root {
      --bg: #f5f3ef;
      --panel: #ffffff;
      --ink: #1d2328;
      --muted: #64717b;
      --line: #d7dde1;
      --accent: #26343f;
      --selected: #101820;
      --shadow: 0 18px 45px rgba(31, 41, 51, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at top left, #ffffff 0, var(--bg) 42rem);
    }

    main {
      display: grid;
      grid-template-columns: minmax(320px, 1fr) 320px;
      gap: 22px;
      width: min(1240px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0;
    }

    .stage {
      min-height: calc(100vh - 48px);
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(215,221,225,0.8);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
      padding: 0;
      position: relative;
    }

    .viewer {
      width: 100%;
      height: calc(100vh - 50px);
      min-height: 520px;
      overflow: auto;
      scrollbar-width: none;
      padding: 24px;
      position: relative;
      cursor: grab;
    }

    .viewer::-webkit-scrollbar { display: none; }
    .viewer.dragging { cursor: grabbing; }

    .svg-wrap {
      aspect-ratio: 715 / 716;
      display: grid;
      place-items: center;
      margin: 0 auto;
    }

    .quilt-svg {
      width: 100%;
      height: 100%;
      display: block;
      background: white;
      border-radius: 8px;
      user-select: none;
      touch-action: none;
    }

    .quilt-svg .patch {
      cursor: pointer;
      transition: fill 120ms ease, stroke 120ms ease, stroke-width 120ms ease, opacity 120ms ease;
    }

    .quilt-svg .quilt-colour-group:hover .patch,
    .quilt-svg .patch.quilt-colour-group:hover {
      stroke: #4f5f68 !important;
      stroke-width: 2.2 !important;
    }

    .quilt-svg .quilt-colour-group.selected .patch,
    .quilt-svg .patch.quilt-colour-group.selected {
      stroke: var(--selected) !important;
      stroke-width: 4.2 !important;
      stroke-linejoin: miter !important;
      filter: drop-shadow(0 0 2px rgba(16,24,32,0.45));
    }

    .view-controls {
      position: absolute;
      left: 18px;
      bottom: 18px;
      display: flex;
      gap: 8px;
      padding: 8px;
      border: 1px solid rgba(215,221,225,0.86);
      border-radius: 16px;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 8px 24px rgba(31, 41, 51, 0.16);
      z-index: 5;
      backdrop-filter: blur(6px);
    }

    .icon-button {
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      width: 40px;
      height: 38px;
      color: var(--ink);
      font: inherit;
      font-size: 1.15rem;
      font-weight: 750;
      cursor: pointer;
      line-height: 1;
    }

    .icon-button:hover { border-color: var(--accent); }
    .icon-button svg { width: 20px; height: 20px; display: block; }

    .panel {
      align-self: start;
      position: sticky;
      top: 24px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 20px;
      z-index: 10;
    }

    .label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 700;
    }

    .colour-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0 0 20px;
    }

    input[type="color"] {
      width: 64px;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 4px;
      background: #fff;
      cursor: pointer;
    }

    .colour-text { flex: 1; min-width: 0; }

    #hexValue {
      display: block;
      margin-top: 3px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .section-title {
      margin: 18px 0 10px;
      font-weight: 700;
    }

    .palette-tools { margin-bottom: 10px; }

    .recent-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 9px;
    }

    .swatch {
      position: relative;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background:
        linear-gradient(45deg, #eee 25%, transparent 25%),
        linear-gradient(-45deg, #eee 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #eee 75%),
        linear-gradient(-45deg, transparent 75%, #eee 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
      cursor: pointer;
      overflow: hidden;
    }

    .swatch[disabled] { cursor: default; opacity: 0.48; }
    .swatch:not([disabled]):hover { outline: 2px solid var(--accent); outline-offset: 2px; }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 20px;
    }

    button.action {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--ink);
      padding: 10px 12px;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }

    button.action:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); color: white; border-color: var(--accent); }

    @media (max-width: 860px) {
      main { grid-template-columns: 1fr; }
      .stage { min-height: 60vh; }
      .viewer { height: 60vh; min-height: 360px; }
      .panel { position: static; }
    }
  </style>
</head>

  <script>
    (function () {

      var zoomInBtn = document.getElementById('zoomIn');

      var RECENT_KEY = 'quilt-colour-picker-recent-v1';
      var MAX_RECENT = 10;
      var MAX_EXTRACTED = 6;
      var VIEWBOX_WIDTH = 715;
      var VIEWBOX_HEIGHT = 716;
      var SAVE_MARKER = 'quilt-colour-picker-save-v2';
      var PATTERN_ID = 'quilt-pattern-715x716-grouped-v1';
      var DEFAULT_BASE_NAME = 'coloured-quilt';
      var MIN_ZOOM = 0.5;
      var MAX_ZOOM = 6;
      var ZOOM_FACTOR = 1.15;

      var groups = [];
      var selectedGroup = null;
      var zoom = 1;
      var fitWidth = VIEWBOX_WIDTH;
      var suppressClick = false;
      var panState = null;
      var touchState = null;
      var extractedColours = [];

      function pad2(value) {
        var text = String(value);
        return text.length >= 2 ? text : '0' + text;
      }

      function getClassText(el) {
        if (!el) return '';
        var value = el.getAttribute ? el.getAttribute('class') : '';
        return value || '';
      }

      function hasClass(el, className) {
        if (!el) return false;
        if (el.classList && el.classList.contains) return el.classList.contains(className);
        return (' ' + getClassText(el) + ' ').indexOf(' ' + className + ' ') !== -1;
      }

      function addClass(el, className) {
        if (!el) return;
        if (el.classList && el.classList.add) {
          el.classList.add(className);
          return;
        }
        if (!hasClass(el, className)) {
          var current = getClassText(el);
          el.setAttribute('class', current ? current + ' ' + className : className);
        }
      }

      function removeClass(el, className) {
        if (!el) return;
        if (el.classList && el.classList.remove) {
          el.classList.remove(className);
          return;
        }
        var cleaned = (' ' + getClassText(el) + ' ').replace(' ' + className + ' ', ' ');
        el.setAttribute('class', cleaned.replace(/^\s+|\s+$/g, '').replace(/\s+/g, ' '));
      }

      function findColourGroup(el) {
        while (el && el !== svg && el.nodeType === 1) {
          if (hasClass(el, 'quilt-colour-group')) return el;
          el = el.parentNode;
        }
        return null;
      }

      function parsePoints(pointsText) {
        var nums = String(pointsText || '').match(/-?\d+(?:\.\d+)?/g) || [];
        var points = [];
        for (var i = 0; i + 1 < nums.length; i += 2) {
          points.push({ x: Number(nums[i]), y: Number(nums[i + 1]) });
        }
        return points;
      }

      function pointInPolygon(x, y, points) {
        var inside = false;
        for (var i = 0, j = points.length - 1; i < points.length; j = i++) {
          var xi = points[i].x, yi = points[i].y;
          var xj = points[j].x, yj = points[j].y;
          var intersect = ((yi > y) !== (yj > y)) &&

      function groupFromPoint(clientX, clientY) {
        var element = null;
        if (document.elementFromPoint) element = document.elementFromPoint(clientX, clientY);
        var group = findColourGroup(element);
        if (group) return group;

        var rect = svg.getBoundingClientRect();
        if (!rect || !rect.width || !rect.height) return null;
        var x = (clientX - rect.left) * VIEWBOX_WIDTH / rect.width;
        var y = (clientY - rect.top) * VIEWBOX_HEIGHT / rect.height;
        var patches = svg.querySelectorAll('.patch');
        for (var i = patches.length - 1; i >= 0; i -= 1) {
          var patch = patches[i];
          if (pointInPolygon(x, y, parsePoints(patch.getAttribute('points')))) {
            return findColourGroup(patch) || (hasClass(patch, 'quilt-colour-group') ? patch : null);

        return null;

        var children = svg.children;

        groups = [];
        for (var i = 0; i < children.length; i += 1) {

          var tag = String(el.tagName || '').toLowerCase();
          var isGroup = tag === 'g';
          var isCentrePatch = tag === 'polygon' && hasClass(el, 'patch');
          if (isGroup || isCentrePatch) {
            groups.push(el);
            addClass(el, 'quilt-colour-group');
            el.setAttribute('data-group-id', el.id || ('group-' + index));
            el.setAttribute('data-group-index', String(index));
            if (!el.getAttribute('data-group-name')) {
              el.setAttribute('data-group-name', el.id === 'patch-095' ? 'Centre patch' : ('SVG group ' + index));
            }
            index += 1;
          }
        }
      }

      function patchesFor(group) {
        if (!group) return [];
        if (hasClass(group, 'patch')) return [group];
        return Array.prototype.slice.call(group.querySelectorAll('.patch'));
      }

      function rgbToHex(value) {
        if (!value) return null;
        if (value.charAt(0) === '#') return value;
        var match = String(value).match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/i);
        if (!match) return null;
        var parts = [match[1], match[2], match[3]];
        var output = '#';
        for (var i = 0; i < parts.length; i += 1) {
          output += pad2(Number(parts[i]).toString(16));
        }
        return output;
      }

      function normaliseHex(value) {
        if (!value) return '#ffffff';
        var v = String(value).trim().toLowerCase();
        if (/^#[0-9a-f]{6}$/.test(v)) return v;
        if (/^#[0-9a-f]{3}$/.test(v)) {
          return '#' + v.charAt(1) + v.charAt(1) + v.charAt(2) + v.charAt(2) + v.charAt(3) + v.charAt(3);
        }
        var fromRgb = rgbToHex(v);
        if (fromRgb && /^#[0-9a-f]{6}$/i.test(fromRgb)) return fromRgb.toLowerCase();
        return '#ffffff';
      }

      function setPickerColour(value) {
        var hex = normaliseHex(value);
        colourPicker.value = hex;
        hexValue.textContent = hex.toUpperCase();
      }

      function currentFill(group) {
        var patches = patchesFor(group);
        var patch = patches.length ? patches[0] : null;
        if (!patch) return colourPicker.value;
        return normaliseHex(patch.style.fill || window.getComputedStyle(patch).fill || '#ffffff');
      }

      function deselectGroup() {
        if (selectedGroup) removeClass(selectedGroup, 'selected');
        selectedGroup = null;
      }

      function selectGroup(group) {
        if (selectedGroup) removeClass(selectedGroup, 'selected');
        selectedGroup = group;
        addClass(selectedGroup, 'selected');
        setPickerColour(currentFill(group));
      }

      function toggleGroup(group) {
        if (selectedGroup === group) deselectGroup();
        else selectGroup(group);
      }

      function storageGet(key) {
        try { return window.localStorage.getItem(key); } catch (e) { return null; }
      }

      function storageSet(key, value) {
        try { window.localStorage.setItem(key, value); } catch (e) {}
      }

      function getRecentColours() {
        var raw = storageGet(RECENT_KEY) || '[]';
        var parsed;
        try { parsed = JSON.parse(raw); } catch (e) { parsed = []; }
        if (!Array.isArray(parsed)) parsed = [];
        var output = [];
        for (var i = 0; i < parsed.length && output.length < MAX_RECENT; i += 1) {
          var hex = normaliseHex(parsed[i]);
          if (/^#[0-9a-f]{6}$/i.test(hex)) output.push(hex);
        }
        return output;
      }

      function saveRecentColours(colours) {
        storageSet(RECENT_KEY, JSON.stringify(colours.slice(0, MAX_RECENT)));
      }

      function addRecentColour(colour) {
        var hex = normaliseHex(colour);
        var old = getRecentColours();
        var merged = [hex];
        for (var i = 0; i < old.length && merged.length < MAX_RECENT; i += 1) {
          if (old[i].toLowerCase() !== hex.toLowerCase()) merged.push(old[i]);
        }
        saveRecentColours(merged);
        renderRecentColours();
      }

      function buildSwatch(colour, label, onClick) {
        var button = document.createElement('button');
        button.type = 'button';
        button.className = 'swatch';
        if (!colour) {
          button.disabled = true;
          button.title = 'Empty colour slot';
          button.setAttribute('aria-label', 'Empty colour slot');
          return button;
        }
        var hex = normaliseHex(colour);
        button.style.background = hex;
        button.title = label + ' ' + hex.toUpperCase();
        button.setAttribute('aria-label', label + ' ' + hex.toUpperCase());
        button.addEventListener('click', function () { onClick(hex); });
        button.addEventListener('touchend', function (event) { event.preventDefault(); onClick(hex); }, false);
        return button;
      }

      function renderRecentColours() {
        recentColoursEl.innerHTML = '';
        var colours = getRecentColours();
        for (var i = 0; i < MAX_RECENT; i += 1) {
          recentColoursEl.appendChild(buildSwatch(colours[i], 'Use recent colour', function (colour) { applyColour(colour, true); }));
        }
      }

      function renderExtractedColours() {
        extractedColoursEl.innerHTML = '';
        for (var i = 0; i < MAX_EXTRACTED; i += 1) {
          extractedColoursEl.appendChild(buildSwatch(extractedColours[i], 'Use extracted colour', function (colour) { applyColour(colour, true); }));
        }
      }

      function applyColour(colour, remember) {
        var hex = normaliseHex(colour);
        setPickerColour(hex);
        if (selectedGroup) {
          var patches = patchesFor(selectedGroup);
          for (var i = 0; i < patches.length; i += 1) {
            patches[i].style.fill = hex;
            patches[i].style.fillOpacity = '1';
          }
          selectedGroup.setAttribute('data-colour', hex);
        }
        if (remember) addRecentColour(hex);
      }

      function clearSelected() {
        if (!selectedGroup) return;
        var patches = patchesFor(selectedGroup);
        for (var i = 0; i < patches.length; i += 1) {
          patches[i].style.fill = '#ffffff';
          patches[i].style.fillOpacity = '1';
        }
        selectedGroup.setAttribute('data-colour', '#ffffff');
        setPickerColour('#ffffff');
        addRecentColour('#ffffff');
      }

      function resetAll() {
        for (var i = 0; i < groups.length; i += 1) {
          var patches = patchesFor(groups[i]);
          for (var j = 0; j < patches.length; j += 1) {
            patches[j].style.fill = '#ffffff';
            patches[j].style.fillOpacity = '1';
          }
          groups[i].removeAttribute('data-colour');
        }
        deselectGroup();
        setPickerColour('#d8a24a');
      }

      function recalculateFitWidth() {
        var availableW = Math.max(180, viewer.clientWidth - 48);
        var availableH = Math.max(180, viewer.clientHeight - 48);
        fitWidth = Math.min(availableW, availableH * (VIEWBOX_WIDTH / VIEWBOX_HEIGHT));
      }

      function applyWrapSize() {
        recalculateFitWidth();
        var width = fitWidth * zoom;
        var height = width * (VIEWBOX_HEIGHT / VIEWBOX_WIDTH);
        svgWrap.style.width = width + 'px';
        svgWrap.style.height = height + 'px';
      }

      function setZoom(nextZoom, anchorClientX, anchorClientY) {
        var rect = viewer.getBoundingClientRect();
        var anchorX = anchorClientX == null ? rect.left + rect.width / 2 : anchorClientX;
        var anchorY = anchorClientY == null ? rect.top + rect.height / 2 : anchorClientY;
        var oldWidth = svgWrap.offsetWidth || 1;
        var oldHeight = svgWrap.offsetHeight || 1;
        var relativeX = (viewer.scrollLeft + (anchorX - rect.left)) / oldWidth;
        var relativeY = (viewer.scrollTop + (anchorY - rect.top)) / oldHeight;

        zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, nextZoom));
        applyWrapSize();

        window.requestAnimationFrame(function () {
          var newWidth = svgWrap.offsetWidth || 1;
          var newHeight = svgWrap.offsetHeight || 1;
          viewer.scrollLeft = relativeX * newWidth - (anchorX - rect.left);
          viewer.scrollTop = relativeY * newHeight - (anchorY - rect.top);
        });
      }

      function fitView() {
        zoom = 1;
        applyWrapSize();
        window.requestAnimationFrame(function () {
          viewer.scrollLeft = Math.max(0, (viewer.scrollWidth - viewer.clientWidth) / 2);
          viewer.scrollTop = Math.max(0, (viewer.scrollHeight - viewer.clientHeight) / 2);
        });
      }

      function promptFileName(baseName, extension) {
        var response = window.prompt('File name', baseName);
        if (response === null) return null;
        var cleaned = (response.trim() || baseName).replace(/[\\/:*?"<>|]+/g, '-');
        if (cleaned.toLowerCase().slice(-extension.length - 1) !== '.' + extension.toLowerCase()) cleaned += '.' + extension;
        return cleaned;
      }

      function cleanSvgClone() {
        var clone = svg.cloneNode(true);
        clone.removeAttribute('id');
        removeClass(clone, 'quilt-svg');
        clone.setAttribute('width', String(VIEWBOX_WIDTH));
        clone.setAttribute('height', String(VIEWBOX_HEIGHT));
        clone.setAttribute('viewBox', '0 0 ' + VIEWBOX_WIDTH + ' ' + VIEWBOX_HEIGHT);
        clone.setAttribute('data-quilt-picker-save', SAVE_MARKER);
        clone.setAttribute('data-quilt-pattern-id', PATTERN_ID);

        var selected = clone.querySelectorAll('.selected');
        for (var i = 0; i < selected.length; i += 1) removeClass(selected[i], 'selected');

        var savedGroups = clone.querySelectorAll('.quilt-colour-group');
        for (var j = 0; j < savedGroups.length; j += 1) {
          removeClass(savedGroups[j], 'quilt-colour-group');
          savedGroups[j].removeAttribute('data-group-id');
          savedGroups[j].removeAttribute('data-group-name');
          savedGroups[j].removeAttribute('data-group-index');
          savedGroups[j].removeAttribute('data-colour');
        }
        return clone;
      }

      function serialiseCleanSvg() {
        return '<?xml version="1.0" encoding="UTF-8"?>\n' + new XMLSerializer().serializeToString(cleanSvgClone());
      }

      function triggerDownload(blob, filename) {
        var url = URL.createObjectURL(blob);
        var link = document.createElement('a');
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
      }

      function saveSvg() {
        var filename = promptFileName(DEFAULT_BASE_NAME, 'svg');
        if (!filename) return;
        triggerDownload(new Blob([serialiseCleanSvg()], { type: 'image/svg+xml' }), filename);
      }

      function downloadRaster(type) {
        var extension = type === 'jpeg' ? 'jpg' : 'png';
        var filename = promptFileName(DEFAULT_BASE_NAME, extension);
        if (!filename) return;

        var url = URL.createObjectURL(new Blob([serialiseCleanSvg()], { type: 'image/svg+xml' }));
        var image = new Image();
        image.onload = function () {
          var scale = 2;
          var canvas = document.createElement('canvas');
          canvas.width = VIEWBOX_WIDTH * scale;
          canvas.height = VIEWBOX_HEIGHT * scale;
          var ctx = canvas.getContext('2d');
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
          var mime = type === 'jpeg' ? 'image/jpeg' : 'image/png';
          canvas.toBlob(function (blob) {
            if (blob) triggerDownload(blob, filename);
            URL.revokeObjectURL(url);
          }, mime, 0.95);
        };
        image.onerror = function () {
          URL.revokeObjectURL(url);
          window.alert('Could not create the image file.');
        };
        image.src = url;
      }

      function readFileAsText(file, callback) {
        var reader = new FileReader();
        reader.onload = function () { callback(null, String(reader.result || '')); };
        reader.onerror = function () { callback(reader.error || new Error('File read failed')); };
        reader.readAsText(file);
      }

      function fillFromElement(element) {
        var explicit = element.getAttribute('fill');
        if (explicit) return normaliseHex(explicit);
        if (element.style && element.style.fill) return normaliseHex(element.style.fill);
        var styleAttr = element.getAttribute('style') || '';
        var match = styleAttr.match(/fill\s*:\s*([^;]+)/i);
        if (match) return normaliseHex(match[1]);
        return '#ffffff';
      }

      function handleLoadSvg(file) {
        if (!file) return;
        readFileAsText(file, function (error, text) {
          if (error) {
            window.alert('Could not read that SVG file.');
            return;
          }
          var doc = new DOMParser().parseFromString(text, 'image/svg+xml');
          var root = doc.documentElement;
          if (!root || String(root.tagName).toLowerCase() !== 'svg') {
            window.alert('That file is not a valid SVG.');
            return;
          }
          if (root.getAttribute('data-quilt-picker-save') !== SAVE_MARKER || root.getAttribute('data-quilt-pattern-id') !== PATTERN_ID) {
            window.alert('That SVG is not a quilt file saved by this app.');
            return;
          }

          var savedPatches = {};
          var imported = root.querySelectorAll('.patch[id], polygon[id^="patch-"]');
          for (var i = 0; i < imported.length; i += 1) savedPatches[imported[i].id] = fillFromElement(imported[i]);

          var current = svg.querySelectorAll('.patch[id]');
          for (var j = 0; j < current.length; j += 1) {
            if (!Object.prototype.hasOwnProperty.call(savedPatches, current[j].id)) {
              window.alert('That SVG does not match this quilt pattern.');
              return;
            }
          }

          for (var k = 0; k < current.length; k += 1) {
            current[k].style.fill = savedPatches[current[k].id] || '#ffffff';
            current[k].style.fillOpacity = '1';
          }
          deselectGroup();
          setPickerColour('#d8a24a');
        });
      }

      function colourDistance(a, b) {
        return Math.sqrt(
          Math.pow(a.r - b.r, 2) +
          Math.pow(a.g - b.g, 2) +
          Math.pow(a.b - b.b, 2)
        );
      }

      function rgbToHsl(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        var max = Math.max(r, g, b);
        var min = Math.min(r, g, b);
        var l = (max + min) / 2;
        if (max === min) return { s: 0, l: l };
        var d = max - min;
        var s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        return { s: s, l: l };
      }

      function readFileAsDataURL(file, callback) {
        var reader = new FileReader();
        reader.onload = function () { callback(null, reader.result); };
        reader.onerror = function () { callback(reader.error || new Error('File read failed')); };
        reader.readAsDataURL(file);
      }

      function extractPaletteFromImage(file) {
        if (!file) return;
        readFileAsDataURL(file, function (error, dataUrl) {
          if (error) {
            window.alert('Could not read that image.');
            return;
          }
          var image = new Image();
          image.onload = function () {
            var maxDimension = 160;
            var scale = Math.min(1, maxDimension / Math.max(image.width, image.height));
            var width = Math.max(1, Math.round(image.width * scale));
            var height = Math.max(1, Math.round(image.height * scale));
            var canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            var ctx = canvas.getContext('2d');
            ctx.drawImage(image, 0, 0, width, height);
            var data = ctx.getImageData(0, 0, width, height).data;
            var buckets = {};

            for (var i = 0; i < data.length; i += 4) {
              if (data[i + 3] < 220) continue;
              var r = data[i], g = data[i + 1], b = data[i + 2];
              var qR = Math.max(0, Math.min(255, Math.round(r / 16) * 16));
              var qG = Math.max(0, Math.min(255, Math.round(g / 16) * 16));
              var qB = Math.max(0, Math.min(255, Math.round(b / 16) * 16));
              var key = qR + ',' + qG + ',' + qB;
              var hsl = rgbToHsl(r, g, b);
              var weight = 1;
              if (hsl.l > 0.95 || hsl.l < 0.05) weight *= 0.5;
              if (hsl.s > 0.2) weight *= 1.15;
              buckets[key] = (buckets[key] || 0) + weight;
            }

            var colours = [];
            for (var key in buckets) {
              if (Object.prototype.hasOwnProperty.call(buckets, key)) {
                var parts = key.split(',');
                colours.push({ r: Number(parts[0]), g: Number(parts[1]), b: Number(parts[2]), weight: buckets[key] });
              }
            }
            colours.sort(function (a, b) { return b.weight - a.weight; });

            var merged = [];
            for (var c = 0; c < colours.length && merged.length < MAX_EXTRACTED; c += 1) {
              var keep = true;
              for (var m = 0; m < merged.length; m += 1) {
                if (colourDistance(colours[c], merged[m]) <= 42) { keep = false; break; }
              }
              if (keep) merged.push(colours[c]);
            }
            if (merged.length < 4) {
              for (var extra = 0; extra < colours.length && merged.length < Math.min(4, colours.length); extra += 1) {
                if (merged.indexOf(colours[extra]) === -1) merged.push(colours[extra]);
              }
            }

            extractedColours = [];
            for (var x = 0; x < merged.length && x < MAX_EXTRACTED; x += 1) {
              var hex = '#' + [merged[x].r, merged[x].g, merged[x].b].map(function (v) {
                return pad2(Number(v).toString(16));
              }).join('');
              extractedColours.push(normaliseHex(hex));
            }
            renderExtractedColours();
          };
          image.onerror = function () { window.alert('Could not load that image.'); };
          image.src = dataUrl;
        });
      }

      function beginPan(clientX, clientY) {
        panState = {
          startX: clientX,
          startY: clientY,
          scrollLeft: viewer.scrollLeft,
          scrollTop: viewer.scrollTop,
          moved: false
        };
        addClass(viewer, 'dragging');
      }

      function updatePan(clientX, clientY) {
        if (!panState) return;
        var dx = clientX - panState.startX;
        var dy = clientY - panState.startY;
        if (Math.abs(dx) > 4 || Math.abs(dy) > 4) {
          panState.moved = true;
          suppressClick = true;
        }
        viewer.scrollLeft = panState.scrollLeft - dx;
        viewer.scrollTop = panState.scrollTop - dy;
      }

      function endPan() {
        if (!panState) return;
        var moved = panState.moved;
        panState = null;
        removeClass(viewer, 'dragging');
        if (moved) window.setTimeout(function () { suppressClick = false; }, 80);
      }

      function init() {
        setupGroups();
        renderRecentColours();
        renderExtractedColours();
        setPickerColour('#d8a24a');
        fitView();

        svg.addEventListener('click', function (event) {
          if (suppressClick) { suppressClick = false; return; }
          var group = findColourGroup(event.target) || groupFromPoint(event.clientX, event.clientY);
          if (group) toggleGroup(group);
        });

        viewer.addEventListener('mousedown', function (event) {
          if (event.button !== 0) return;
          beginPan(event.clientX, event.clientY);
        });
        document.addEventListener('mousemove', function (event) { updatePan(event.clientX, event.clientY); });
        document.addEventListener('mouseup', endPan);

        viewer.addEventListener('touchstart', function (event) {
          if (event.touches.length !== 1) {
            touchState = null;
            endPan();
            return;
          }
          var touch = event.touches[0];
          touchState = {
            startX: touch.clientX,
            startY: touch.clientY,
            group: groupFromPoint(touch.clientX, touch.clientY) || findColourGroup(event.target),
            dragging: false
          };
        }, false);
        viewer.addEventListener('touchmove', function (event) {
          if (!touchState || event.touches.length !== 1) return;
          var touch = event.touches[0];
          var dx = touch.clientX - touchState.startX;
          var dy = touch.clientY - touchState.startY;
          var movedFarEnoughToPan = Math.abs(dx) > 18 || Math.abs(dy) > 18;

          if (!touchState.dragging && movedFarEnoughToPan) {
            touchState.dragging = true;
            beginPan(touchState.startX, touchState.startY);
          }

          if (touchState.dragging) {
            updatePan(touch.clientX, touch.clientY);
            if (event.preventDefault) event.preventDefault();
          }
        }, false);
        viewer.addEventListener('touchend', function (event) {
          var state = touchState;
          var touch = event.changedTouches && event.changedTouches.length ? event.changedTouches[0] : null;
          touchState = null;

          if (state && state.dragging) {
            endPan();
            return;
          }

          endPan();
          var group = state ? state.group : null;
          if (!group && touch) group = groupFromPoint(touch.clientX, touch.clientY);

          if (group) {
            if (event.preventDefault) event.preventDefault();
            suppressClick = true;
            toggleGroup(group);
            window.setTimeout(function () { suppressClick = false; }, 700);
          }
        }, false);
        viewer.addEventListener('touchcancel', function () {
          touchState = null;
          endPan();
        });

        viewer.addEventListener('wheel', function (event) {
          event.preventDefault();
          var factor = event.deltaY < 0 ? ZOOM_FACTOR : 1 / ZOOM_FACTOR;
          setZoom(zoom * factor, event.clientX, event.clientY);
        }, false);

        colourPicker.addEventListener('input', function () { applyColour(colourPicker.value, false); });
        colourPicker.addEventListener('change', function () { applyColour(colourPicker.value, true); });
        clearSelectedBtn.addEventListener('click', clearSelected);
        resetAllBtn.addEventListener('click', resetAll);
        saveSvgBtn.addEventListener('click', saveSvg);
        loadSvgBtn.addEventListener('click', function () { loadSvgInput.click(); });
        loadSvgInput.addEventListener('change', function () {
          if (loadSvgInput.files && loadSvgInput.files[0]) handleLoadSvg(loadSvgInput.files[0]);
          loadSvgInput.value = '';
        });
        downloadPngBtn.addEventListener('click', function () { downloadRaster('png'); });
        downloadJpegBtn.addEventListener('click', function () { downloadRaster('jpeg'); });
        extractPaletteBtn.addEventListener('click', function () { extractImageInput.click(); });
        extractImageInput.addEventListener('change', function () {
          if (extractImageInput.files && extractImageInput.files[0]) extractPaletteFromImage(extractImageInput.files[0]);
          extractImageInput.value = '';
        });
        zoomOutBtn.addEventListener('click', function () { setZoom(zoom / ZOOM_FACTOR); });
        zoomInBtn.addEventListener('click', function () { setZoom(zoom * ZOOM_FACTOR); });
        fitViewBtn.addEventListener('click', fitView);
        window.addEventListener('resize', function () { setZoom(zoom); });
      }

      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
      else init();
    }());
  </script>
</body>
</html>
