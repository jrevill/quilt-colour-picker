<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Squared Up Fabric Planner</title>
  <style>
    :root {
      --bg: #f4f1ec;
      --panel: #ffffff;
      --ink: #1d2328;
      --muted: #65727c;
      --line: #d8dee3;
      --accent: #26343f;
      --selected: #101820;
      --shadow: 0 16px 40px rgba(31, 41, 51, 0.13);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at top left, #ffffff 0, var(--bg) 48rem);
    }

    main {
      display: grid;
      grid-template-columns: minmax(300px, 1fr) 340px;
      gap: 22px;
      width: min(1260px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 22px 0;
    }

    .stage {
      height: calc(100vh - 44px);
      min-height: 420px;
      background: rgba(255,255,255,0.74);
      border: 1px solid rgba(216,222,227,0.9);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
      padding: 18px;
      display: grid;
      place-items: center;
    }

    .quilt-frame {
      width: 100%;
      max-width: none;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 14px;
      box-shadow: inset 0 0 0 1px rgba(216,222,227,0.7);
    }

    #quiltSvg {
      width: 100%;
      height: auto;
      display: block;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    .block-hit {
      fill: transparent;
      cursor: pointer;
    }

    .selection-outline {
      pointer-events: none;
      fill: none;
      stroke: var(--selected);
      stroke-width: 0.34;
      vector-effect: non-scaling-stroke;
      filter: drop-shadow(0 0 0.8px rgba(16,24,32,0.65));
    }

    .panel {
      align-self: start;
      position: sticky;
      top: 22px;
      max-height: calc(100vh - 44px);
      overflow-y: auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 20px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
    }

    .hint {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.42;
    }

    .section-title {
      margin: 18px 0 10px;
      font-weight: 750;
      font-size: 0.98rem;
    }

    .colour-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 12px 0 10px;
    }

    input[type="color"] {
      width: 64px;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 4px;
      background: #fff;
      cursor: pointer;
    }

    .label {
      display: block;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 750;
    }

    #bgHex,
    #selectedPatternName {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.9rem;
      overflow-wrap: anywhere;
    }

    .swatch-tools {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .swatch-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    .swatch {
      position: relative;
      aspect-ratio: 1 / 1;
      border: 2px solid var(--line);
      border-radius: 14px;
      background: #f3f3f3;
      background-size: cover;
      background-position: center;
      cursor: pointer;
      overflow: hidden;
      min-height: 76px;
    }

    .swatch.selected {
      border-color: var(--selected);
      box-shadow: 0 0 0 3px rgba(16,24,32,0.14);
    }

    .swatch-name {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 4px 6px;
      font-size: 0.68rem;
      background: rgba(255,255,255,0.86);
      color: var(--ink);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 20px;
    }

    button.action {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--ink);
      padding: 10px 12px;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }

    button.action:hover,
    button.action:focus-visible {
      border-color: var(--accent);
      outline: none;
    }

    button.primary {
      grid-column: 1 / -1;
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .small-note {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.38;
    }

    @media (max-width: 880px) {
      main { grid-template-columns: 1fr; }
      .stage { height: auto; min-height: auto; }
      .panel { position: static; max-height: none; overflow-y: visible; }
      .swatch-grid { grid-template-columns: repeat(4, 1fr); }
    }

    @media (max-width: 520px) {
      main { width: min(100vw - 16px, 1260px); padding: 8px 0; gap: 12px; }
      .stage, .panel { border-radius: 16px; padding: 12px; }
      .quilt-frame { padding: 8px; border-radius: 12px; }
      .swatch-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
  <main>
    <section class="stage" aria-label="Quilt mock-up">
      <div class="quilt-frame">
        <svg id="quiltSvg" viewBox="0 0 62 74" aria-label="5 by 6 Squared Up quilt planner" role="img">
          <defs id="patternDefs"></defs>
          <rect id="sashingRect" x="0" y="0" width="62" height="74" fill="#f7f1dc"></rect>
          <g id="blocksLayer"></g>
        </svg>
      </div>
    </section>

    <aside class="panel" aria-label="Fabric controls">
      <h1>Squared Up fabric planner</h1>
      <div class="section-title">Plain background / sashing</div>
      <div class="colour-row">
        <input id="bgPicker" type="color" value="#f7f1dc" aria-label="Choose background and sashing colour">
        <div>
          <span class="label">Background</span>
          <span id="bgHex">#F7F1DC</span>
        </div>
      </div>

      <div class="section-title">Pattern picker</div>
      <div class="swatch-tools">
        <button id="uploadSwatchesBtn" class="action" type="button">Upload swatches</button>
        <input id="swatchInput" type="file" accept="image/png,image/jpeg,.png,.jpg,.jpeg" multiple hidden>
      </div>
      <span class="label" style="margin-top:12px;">Selected pattern</span>
      <span id="selectedPatternName">None</span>
      <div id="swatchGrid" class="swatch-grid" aria-label="Uploaded pattern swatches"></div>

      <div class="buttons">
        <button id="clearBlockBtn" class="action" type="button">Clear block</button>
        <button id="rotateBlockBtn" class="action" type="button">Rotate swatch</button>
        <button id="saveDesignBtn" class="action" type="button">Save design</button>
        <button id="loadDesignBtn" class="action" type="button">Load design</button>
        <button id="resetBtn" class="action" type="button">Reset all</button>
        <button id="downloadJpegBtn" class="action" type="button">Download JPEG</button>
        <button id="downloadPngBtn" class="action primary" type="button">Download PNG</button>
        <input id="designInput" type="file" accept="application/json,.json" hidden>
      </div>

    </aside>
  </main>

  <script>
    (function () {
      var COLS = 5;
      var ROWS = 6;
      var BLOCK = 10;
      var GAP = 2;
      var BORDER = 2;
      var W = 62;
      var H = 74;
      var EXPORT_SCALE = 40; // 40 pixels per inch: 2480 x 2960 px output
      var FRAME_MAX_WIDTH = 780;
      var svgns = 'http://www.w3.org/2000/svg';

      var svg = document.getElementById('quiltSvg');
      var stage = document.querySelector('.stage');
      var quiltFrame = document.querySelector('.quilt-frame');
      var defs = document.getElementById('patternDefs');
      var blocksLayer = document.getElementById('blocksLayer');
      var sashingRect = document.getElementById('sashingRect');
      var bgPicker = document.getElementById('bgPicker');
      var bgHex = document.getElementById('bgHex');
      var uploadSwatchesBtn = document.getElementById('uploadSwatchesBtn');
      var swatchInput = document.getElementById('swatchInput');
      var swatchGrid = document.getElementById('swatchGrid');
      var selectedPatternName = document.getElementById('selectedPatternName');
      var clearBlockBtn = document.getElementById('clearBlockBtn');
      var rotateBlockBtn = document.getElementById('rotateBlockBtn');
      var resetBtn = document.getElementById('resetBtn');
      var saveDesignBtn = document.getElementById('saveDesignBtn');
      var loadDesignBtn = document.getElementById('loadDesignBtn');
      var designInput = document.getElementById('designInput');
      var downloadPngBtn = document.getElementById('downloadPngBtn');
      var downloadJpegBtn = document.getElementById('downloadJpegBtn');

      var fabrics = [];
      var selectedFabricId = null;
      var selectedBlockId = null;
      var blockFills = {};
      var blockRotations = {};
      var nextFabricId = 1;
      var DESIGN_TYPE = 'squared-up-fabric-planner-design';
      var builtInSwatches = [];
      for (var builtIndex = 1; builtIndex <= 40; builtIndex += 1) {
        var suffix = builtIndex < 10 ? '0' + builtIndex : String(builtIndex);
        builtInSwatches.push({
          id: 'builtin-' + suffix,
          name: 'Fabric ' + suffix,
          sources: ['swatches/fabric' + suffix + '.jpeg', 'fabric' + suffix + '.jpeg']
        });
      }

      function createSvgEl(name, attrs) {
        var el = document.createElementNS(svgns, name);
        Object.keys(attrs || {}).forEach(function (key) {
          el.setAttribute(key, attrs[key]);
        });
        return el;
      }

      function cssNumber(style, property) {
        var value = parseFloat(style[property]);
        return isNaN(value) ? 0 : value;
      }

      function fitQuiltToStage() {
        if (!stage || !quiltFrame) return;
        var singleColumn = window.matchMedia && window.matchMedia('(max-width: 880px)').matches;
        if (singleColumn) {
          quiltFrame.style.width = '100%';
          return;
        }

        var stageStyle = window.getComputedStyle(stage);
        var frameStyle = window.getComputedStyle(quiltFrame);
        var stagePadX = cssNumber(stageStyle, 'paddingLeft') + cssNumber(stageStyle, 'paddingRight');
        var stagePadY = cssNumber(stageStyle, 'paddingTop') + cssNumber(stageStyle, 'paddingBottom');
        var framePadX = cssNumber(frameStyle, 'paddingLeft') + cssNumber(frameStyle, 'paddingRight');
        var framePadY = cssNumber(frameStyle, 'paddingTop') + cssNumber(frameStyle, 'paddingBottom');

        var availableW = Math.max(100, stage.clientWidth - stagePadX);
        var availableH = Math.max(100, stage.clientHeight - stagePadY);
        var innerMaxW = Math.max(80, availableW - framePadX);
        var innerMaxH = Math.max(80, availableH - framePadY);
        var svgW = Math.min(FRAME_MAX_WIDTH - framePadX, innerMaxW, innerMaxH * (W / H));
        quiltFrame.style.width = Math.max(120, svgW + framePadX) + 'px';
      }

      function normaliseHex(value) {
        var v = String(value || '#ffffff').trim().toLowerCase();
        if (/^#[0-9a-f]{6}$/.test(v)) return v;
        if (/^#[0-9a-f]{3}$/.test(v)) {
          return '#' + v.charAt(1) + v.charAt(1) + v.charAt(2) + v.charAt(2) + v.charAt(3) + v.charAt(3);
        }
        return '#ffffff';
      }

      function blockId(row, col) {
        return 'block-' + row + '-' + col;
      }

      function blockPosition(row, col) {
        return {
          x: BORDER + col * (BLOCK + GAP),
          y: BORDER + row * (BLOCK + GAP)
        };
      }

      function fabricById(id) {
        for (var i = 0; i < fabrics.length; i += 1) {
          if (fabrics[i].id === id) return fabrics[i];
        }
        return null;
      }

      function rotationForBlock(id) {
        return ((Number(blockRotations[id]) || 0) % 360 + 360) % 360;
      }

      function stripRects(x, y, orientation) {
        if (orientation === 'vertical') {
          return [
            { x: x,     y: y, w: 4,  h: BLOCK },
            { x: x + 5, y: y, w: 2,  h: BLOCK },
            { x: x + 8, y: y, w: 2,  h: BLOCK }
          ];
        }
        // Horizontal blocks matching the top-left block are flipped vertically:
        // 2" strip, 1" gap, 2" strip, 1" gap, 4" strip.
        return [
          { x: x, y: y,     w: BLOCK, h: 2 },
          { x: x, y: y + 3, w: BLOCK, h: 2 },
          { x: x, y: y + 6, w: BLOCK, h: 4 }
        ];
      }

      function clearGeneratedClips() {
        var old = defs.querySelectorAll('.block-clip');
        Array.prototype.forEach.call(old, function (el) {
          el.parentNode.removeChild(el);
        });
      }

      function drawEmptyStrips(g, strips) {
        strips.forEach(function (r) {
          g.appendChild(createSvgEl('rect', {
            class: 'strip-fill',
            x: r.x,
            y: r.y,
            width: r.w,
            height: r.h,
            fill: '#ffffff'
          }));
        });
      }

      function drawFabricImage(g, id, pos, strips, fabric) {
        var clipId = 'clip-' + id;
        var clip = createSvgEl('clipPath', {
          id: clipId,
          class: 'block-clip',
          clipPathUnits: 'userSpaceOnUse'
        });
        strips.forEach(function (r) {
          clip.appendChild(createSvgEl('rect', {
            x: r.x,
            y: r.y,
            width: r.w,
            height: r.h
          }));
        });
        defs.appendChild(clip);

        var image = createSvgEl('image', {
          class: 'block-fabric-image',
          href: fabric.dataUrl,
          x: pos.x,
          y: pos.y,
          width: BLOCK,
          height: BLOCK,
          preserveAspectRatio: 'xMidYMid slice',
          'clip-path': 'url(#' + clipId + ')'
        });
        var angle = rotationForBlock(id);
        if (angle) {
          image.setAttribute('transform', 'rotate(' + angle + ' ' + (pos.x + BLOCK / 2) + ' ' + (pos.y + BLOCK / 2) + ')');
        }
        image.setAttributeNS('http://www.w3.org/1999/xlink', 'xlink:href', fabric.dataUrl);
        g.appendChild(image);
      }

      function drawStripOutlines(g, strips) {
        // No permanent strip outlines: the real quilt has fabric pieces separated by sashing/gaps only.
      }

      function drawBlocks() {
        blocksLayer.innerHTML = '';
        clearGeneratedClips();
        for (var row = 0; row < ROWS; row += 1) {
          for (var col = 0; col < COLS; col += 1) {
            var pos = blockPosition(row, col);
            var id = blockId(row, col);
            var orientation = (row + col) % 2 === 0 ? 'horizontal' : 'vertical';
            var strips = stripRects(pos.x, pos.y, orientation);
            var g = createSvgEl('g', {
              class: 'quilt-block',
              'data-block-id': id,
              'data-row': row,
              'data-col': col
            });

            var fabric = blockFills[id] ? fabricById(blockFills[id]) : null;
            if (fabric) drawFabricImage(g, id, pos, strips, fabric);
            else drawEmptyStrips(g, strips);

            drawStripOutlines(g, strips);

            if (id === selectedBlockId) {
              g.appendChild(createSvgEl('rect', {
                class: 'selection-outline',
                x: pos.x,
                y: pos.y,
                width: BLOCK,
                height: BLOCK
              }));
            }

            g.appendChild(createSvgEl('rect', {
              class: 'block-hit',
              x: pos.x,
              y: pos.y,
              width: BLOCK,
              height: BLOCK,
              'data-block-id': id
            }));

            blocksLayer.appendChild(g);
          }
        }
      }

      function setSelectedBlock(id) {
        selectedBlockId = selectedBlockId === id ? null : id;
        drawBlocks();
      }

      function applySelectedFabricToBlock(id) {
        if (!selectedFabricId) {
          setSelectedBlock(id);
          return;
        }
        selectedBlockId = id;
        blockFills[id] = selectedFabricId;
        drawBlocks();
      }

      function addPatternDef(fabric) {
        // Fabric photos are now drawn as clipped SVG images per block, so they fill the full 10" block.
      }

      function renderSwatches() {
        swatchGrid.innerHTML = '';
        fabrics.forEach(function (fabric) {
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'swatch' + (fabric.id === selectedFabricId ? ' selected' : '');
          btn.style.backgroundImage = 'url("' + fabric.dataUrl + '")';
          btn.title = fabric.name;
          btn.setAttribute('aria-label', 'Select pattern ' + fabric.name);
          btn.addEventListener('click', function () {
            selectedFabricId = selectedFabricId === fabric.id ? null : fabric.id;
            selectedPatternName.textContent = selectedFabricId ? fabric.name : 'None';
            renderSwatches();
          });
          var label = document.createElement('span');
          label.className = 'swatch-name';
          label.textContent = fabric.name;
          btn.appendChild(label);
          swatchGrid.appendChild(btn);
        });
      }

      function imageToDataUrl(img) {
        try {
          var canvas = document.createElement('canvas');
          var w = img.naturalWidth || img.width;
          var h = img.naturalHeight || img.height;
          if (!w || !h) return null;
          canvas.width = w;
          canvas.height = h;
          var ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          return canvas.toDataURL('image/jpeg', 0.92);
        } catch (e) {
          return null;
        }
      }

      function addBuiltInSwatch(spec, src, img) {
        if (fabricById(spec.id)) return;
        var dataUrl = imageToDataUrl(img) || src;
        fabrics.push({
          id: spec.id,
          name: spec.name,
          dataUrl: dataUrl,
          img: img,
          sourceUrl: src
        });
        renderSwatches();
      }

      function tryLoadBuiltInSource(spec, sourceIndex) {
        if (sourceIndex >= spec.sources.length) return;
        var img = new Image();
        img.onload = function () {
          addBuiltInSwatch(spec, spec.sources[sourceIndex], img);
        };
        img.onerror = function () {
          tryLoadBuiltInSource(spec, sourceIndex + 1);
        };
        img.src = spec.sources[sourceIndex];
      }

      function loadBuiltInSwatches() {
        builtInSwatches.forEach(function (spec) {
          tryLoadBuiltInSource(spec, 0);
        });
      }

      function loadSwatchFiles(files) {
        Array.prototype.forEach.call(files, function (file) {
          if (!/^image\/(png|jpeg)$/.test(file.type)) return;
          var reader = new FileReader();
          reader.onload = function () {
            var img = new Image();
            img.src = reader.result;
            var fabric = {
              id: 'fabric-' + nextFabricId,
              name: file.name.replace(/\.(png|jpg|jpeg)$/i, ''),
              dataUrl: reader.result,
              img: img
            };
            nextFabricId += 1;
            fabrics.push(fabric);
            addPatternDef(fabric);
            selectedFabricId = fabric.id;
            selectedPatternName.textContent = fabric.name;
            renderSwatches();
          };
          reader.readAsDataURL(file);
        });
      }

      function clearSelectedBlock() {
        if (!selectedBlockId) return;
        delete blockFills[selectedBlockId];
        delete blockRotations[selectedBlockId];
        drawBlocks();
      }

      function rotateSelectedSwatch() {
        if (!selectedBlockId) return;
        var next = (rotationForBlock(selectedBlockId) + 90) % 360;
        if (next) blockRotations[selectedBlockId] = next;
        else delete blockRotations[selectedBlockId];
        drawBlocks();
      }

      function resetAll() {
        blockFills = {};
        blockRotations = {};
        selectedBlockId = null;
        drawBlocks();
      }

      function promptFileName(base, ext) {
        var name = window.prompt('File name', base);
        if (name === null) return null;
        name = (name.trim() || base).replace(/[\\/:*?"<>|]+/g, '-');
        if (name.toLowerCase().slice(-(ext.length + 1)) !== '.' + ext) name += '.' + ext;
        return name;
      }

      function svgEscape(value) {
        return String(value).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      function copyKnownBlocks(source) {
        var output = {};
        source = source || {};
        for (var row = 0; row < ROWS; row += 1) {
          for (var col = 0; col < COLS; col += 1) {
            var id = blockId(row, col);
            if (source[id]) output[id] = source[id];
          }
        }
        return output;
      }

      function copyKnownRotations(source) {
        var output = {};
        source = source || {};
        for (var row = 0; row < ROWS; row += 1) {
          for (var col = 0; col < COLS; col += 1) {
            var id = blockId(row, col);
            var angle = ((Number(source[id]) || 0) % 360 + 360) % 360;
            if (angle) output[id] = angle;
          }
        }
        return output;
      }

      function isBuiltInFabric(id) {
        return /^builtin-\d+$/.test(String(id || ''));
      }

      function externalFabricsForSave() {
        var list = [];
        fabrics.forEach(function (fabric) {
          if (!isBuiltInFabric(fabric.id)) {
            list.push({
              id: fabric.id,
              name: fabric.name,
              dataUrl: fabric.dataUrl
            });
          }
        });
        return list;
      }

      function saveDesign() {
        var filename = promptFileName('squared-up-design', 'json');
        if (!filename) return;
        var design = {
          type: DESIGN_TYPE,
          version: 1,
          layout: { cols: COLS, rows: ROWS, block: BLOCK, gap: GAP, border: BORDER, width: W, height: H },
          background: normaliseHex(bgPicker.value),
          blockFills: copyKnownBlocks(blockFills),
          blockRotations: copyKnownRotations(blockRotations),
          fabrics: externalFabricsForSave()
        };
        var json = JSON.stringify(design, null, 2);
        triggerDownload(new Blob([json], { type: 'application/json' }), filename);
      }

      function addExternalFabricFromDesign(spec) {
        if (!spec || !spec.id || !spec.dataUrl || fabricById(spec.id)) return;
        var img = new Image();
        img.src = spec.dataUrl;
        fabrics.push({
          id: spec.id,
          name: spec.name || spec.id,
          dataUrl: spec.dataUrl,
          img: img
        });
        var match = String(spec.id).match(/^fabric-(\d+)$/);
        if (match) {
          nextFabricId = Math.max(nextFabricId, Number(match[1]) + 1);
        }
      }

      function applyDesign(design) {
        if (!design || design.type !== DESIGN_TYPE) {
          window.alert('That is not a Squared Up fabric planner design file.');
          return;
        }
        if (design.layout && (design.layout.cols !== COLS || design.layout.rows !== ROWS)) {
          window.alert('That design file uses a different quilt layout.');
          return;
        }
        (design.fabrics || []).forEach(addExternalFabricFromDesign);
        var bg = normaliseHex(design.background || '#f7f1dc');
        bgPicker.value = bg;
        sashingRect.setAttribute('fill', bg);
        bgHex.textContent = bg.toUpperCase();
        blockFills = copyKnownBlocks(design.blockFills);
        blockRotations = copyKnownRotations(design.blockRotations);
        selectedBlockId = null;
        selectedFabricId = null;
        selectedPatternName.textContent = 'None';
        renderSwatches();
        drawBlocks();
      }

      function loadDesignFile(file) {
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function () {
          try {
            applyDesign(JSON.parse(reader.result));
          } catch (e) {
            window.alert('Could not read that design file.');
          }
        };
        reader.readAsText(file);
      }

      function svgForExport() {
        var bg = normaliseHex(bgPicker.value);
        var out = [];
        out.push('<?xml version="1.0" encoding="UTF-8"?>');
        out.push('<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="620" height="740" viewBox="0 0 ' + W + ' ' + H + '" data-squared-up-planner="5x6-10in-blocks-2in-gap-v2">');
        out.push('<rect x="0" y="0" width="' + W + '" height="' + H + '" fill="' + bg + '"/>');
        out.push('<defs>');
        for (var row = 0; row < ROWS; row += 1) {
          for (var col = 0; col < COLS; col += 1) {
            var pos = blockPosition(row, col);
            var id = blockId(row, col);
            var orientation = (row + col) % 2 === 0 ? 'horizontal' : 'vertical';
            var strips = stripRects(pos.x, pos.y, orientation);
            out.push('<clipPath id="export-clip-' + id + '" clipPathUnits="userSpaceOnUse">');
            strips.forEach(function (r) {
              out.push('<rect x="' + r.x + '" y="' + r.y + '" width="' + r.w + '" height="' + r.h + '"/>');
            });
            out.push('</clipPath>');
          }
        }
        out.push('</defs>');
        for (var row2 = 0; row2 < ROWS; row2 += 1) {
          for (var col2 = 0; col2 < COLS; col2 += 1) {
            var pos2 = blockPosition(row2, col2);
            var id2 = blockId(row2, col2);
            var orientation2 = (row2 + col2) % 2 === 0 ? 'horizontal' : 'vertical';
            var strips2 = stripRects(pos2.x, pos2.y, orientation2);
            var fabric = blockFills[id2] ? fabricById(blockFills[id2]) : null;
            if (fabric) {
              var angle = rotationForBlock(id2);
              var transform = angle ? ' transform="rotate(' + angle + ' ' + (pos2.x + BLOCK / 2) + ' ' + (pos2.y + BLOCK / 2) + ')"' : '';
              out.push('<image x="' + pos2.x + '" y="' + pos2.y + '" width="' + BLOCK + '" height="' + BLOCK + '" preserveAspectRatio="xMidYMid slice" clip-path="url(#export-clip-' + id2 + ')"' + transform + ' href="' + svgEscape(fabric.dataUrl) + '" xlink:href="' + svgEscape(fabric.dataUrl) + '"/>');
            } else {
              strips2.forEach(function (r) {
                out.push('<rect x="' + r.x + '" y="' + r.y + '" width="' + r.w + '" height="' + r.h + '" fill="#ffffff"/>');
              });
            }
          }
        }
        out.push('</svg>');
        return out.join('\n');
      }

      function serialiseSvg() {
        return svgForExport();
      }

      function triggerDownload(blob, filename) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(function () { URL.revokeObjectURL(url); }, 0);
      }

      function downloadSvg() {
        var filename = promptFileName('squared-up-fabric-planner', 'svg');
        if (!filename) return;
        triggerDownload(new Blob([serialiseSvg()], { type: 'image/svg+xml' }), filename);
      }

      function drawImageCover(ctx, img, x, y, w, h) {
        var iw = img.naturalWidth || img.width;
        var ih = img.naturalHeight || img.height;
        if (!iw || !ih) return;
        var scale = Math.max(w / iw, h / ih);
        var sw = w / scale;
        var sh = h / scale;
        var sx = (iw - sw) / 2;
        var sy = (ih - sh) / 2;
        ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
      }

      function imageReady(img) {
        return new Promise(function (resolve) {
          if (!img) return resolve();
          if (img.complete && (img.naturalWidth || img.width)) return resolve();
          img.onload = function () { resolve(); };
          img.onerror = function () { resolve(); };
        });
      }

      function drawRasterToCanvas(canvas, scale) {
        var ctx = canvas.getContext('2d');
        canvas.width = W * scale;
        canvas.height = H * scale;
        ctx.fillStyle = normaliseHex(bgPicker.value);
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        for (var row = 0; row < ROWS; row += 1) {
          for (var col = 0; col < COLS; col += 1) {
            var pos = blockPosition(row, col);
            var id = blockId(row, col);
            var orientation = (row + col) % 2 === 0 ? 'horizontal' : 'vertical';
            var strips = stripRects(pos.x, pos.y, orientation);
            var fabric = blockFills[id] ? fabricById(blockFills[id]) : null;
            ctx.save();
            ctx.beginPath();
            strips.forEach(function (r) {
              ctx.rect(r.x * scale, r.y * scale, r.w * scale, r.h * scale);
            });
            ctx.clip();
            if (fabric && fabric.img) {
              var angle = rotationForBlock(id);
              if (angle) {
                var cx = (pos.x + BLOCK / 2) * scale;
                var cy = (pos.y + BLOCK / 2) * scale;
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(angle * Math.PI / 180);
                ctx.translate(-cx, -cy);
                drawImageCover(ctx, fabric.img, pos.x * scale, pos.y * scale, BLOCK * scale, BLOCK * scale);
                ctx.restore();
              } else {
                drawImageCover(ctx, fabric.img, pos.x * scale, pos.y * scale, BLOCK * scale, BLOCK * scale);
              }
            } else {
              ctx.fillStyle = '#ffffff';
              strips.forEach(function (r) {
                ctx.fillRect(r.x * scale, r.y * scale, r.w * scale, r.h * scale);
              });
            }
            ctx.restore();
          }
        }
      }

      function downloadRaster(kind) {
        var ext = kind === 'jpeg' ? 'jpg' : 'png';
        var filename = promptFileName('squared-up-fabric-planner', ext);
        if (!filename) return;
        var promises = [];
        fabrics.forEach(function (fabric) { promises.push(imageReady(fabric.img)); });
        Promise.all(promises).then(function () {
          var canvas = document.createElement('canvas');
          drawRasterToCanvas(canvas, EXPORT_SCALE);
          canvas.toBlob(function (outBlob) {
            if (outBlob) triggerDownload(outBlob, filename);
          }, kind === 'jpeg' ? 'image/jpeg' : 'image/png', 0.95);
        });
      }

      function svgPointFromEvent(event) {
        var pt = svg.createSVGPoint();
        pt.x = event.clientX;
        pt.y = event.clientY;
        return pt.matrixTransform(svg.getScreenCTM().inverse());
      }

      function blockAtPoint(point) {
        for (var row = 0; row < ROWS; row += 1) {
          for (var col = 0; col < COLS; col += 1) {
            var pos = blockPosition(row, col);
            if (point.x >= pos.x && point.x <= pos.x + BLOCK && point.y >= pos.y && point.y <= pos.y + BLOCK) {
              return blockId(row, col);
            }
          }
        }
        return null;
      }

      function handleSvgTap(event) {
        var source = event.changedTouches ? event.changedTouches[0] : event;
        if (!source) return;
        var point = svgPointFromEvent(source);
        var id = blockAtPoint(point);
        if (id) applySelectedFabricToBlock(id);
      }

      var touchStart = null;
      svg.addEventListener('click', function (event) {
        handleSvgTap(event);
      });
      svg.addEventListener('touchstart', function (event) {
        var t = event.changedTouches && event.changedTouches[0];
        if (!t) return;
        touchStart = { x: t.clientX, y: t.clientY };
      });
      svg.addEventListener('touchend', function (event) {
        var t = event.changedTouches && event.changedTouches[0];
        if (!t || !touchStart) return;
        var dx = Math.abs(t.clientX - touchStart.x);
        var dy = Math.abs(t.clientY - touchStart.y);
        touchStart = null;
        if (dx < 12 && dy < 12) {
          event.preventDefault();
          handleSvgTap(event);
        }
      });

      bgPicker.addEventListener('input', function () {
        var hex = normaliseHex(bgPicker.value);
        sashingRect.setAttribute('fill', hex);
        bgHex.textContent = hex.toUpperCase();
      });
      uploadSwatchesBtn.addEventListener('click', function () { swatchInput.click(); });
      swatchInput.addEventListener('change', function () {
        if (swatchInput.files) loadSwatchFiles(swatchInput.files);
        swatchInput.value = '';
      });
      clearBlockBtn.addEventListener('click', clearSelectedBlock);
      rotateBlockBtn.addEventListener('click', rotateSelectedSwatch);
      resetBtn.addEventListener('click', resetAll);
      saveDesignBtn.addEventListener('click', saveDesign);
      loadDesignBtn.addEventListener('click', function () { designInput.click(); });
      designInput.addEventListener('change', function () {
        if (designInput.files && designInput.files[0]) loadDesignFile(designInput.files[0]);
        designInput.value = '';
      });
      downloadPngBtn.addEventListener('click', function () { downloadRaster('png'); });
      downloadJpegBtn.addEventListener('click', function () { downloadRaster('jpeg'); });

      window.addEventListener('resize', fitQuiltToStage);
      loadBuiltInSwatches();
      drawBlocks();
      fitQuiltToStage();
    })();
  </script>
</body>
</html>
